name: Blogger Daily Post

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write OAuth files (base64)
        env:
          BLOGGER_CLIENT_SECRET_B64: ${{ secrets.BLOGGER_CLIENT_SECRET_B64 }}
          BLOGGER_TOKEN_B64: ${{ secrets.BLOGGER_TOKEN_B64 }}
        run: |
          if [ -z "$BLOGGER_CLIENT_SECRET_B64" ] || [ -z "$BLOGGER_TOKEN_B64" ]; then
            echo "Missing BLOGGER_CLIENT_SECRET_B64 or BLOGGER_TOKEN_B64" >&2
            exit 1
          fi
          echo "$BLOGGER_CLIENT_SECRET_B64" | base64 -d > client_secret.json
          echo "$BLOGGER_TOKEN_B64" | base64 -d > token.json

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autoposter
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PIXABAY_ENABLE: ${{ secrets.PIXABAY_ENABLE }}
          OWNER_KEY_REQUIRED: ${{ secrets.OWNER_KEY_REQUIRED }}
          OWNER_KEY: ${{ secrets.OWNER_KEY }}
        run: |
          python main.py
