kind = "web"
previewPath = "/"
title = "AI Blogger Dashboard"
version = "1.0.0"
id = "artifacts/blogger-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18518

[services.development]
run = "pnpm --filter @workspace/blogger-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blogger-dashboard", "run", "build" ]
publicDir = "artifacts/blogger-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18518"
BASE_PATH = "/"
