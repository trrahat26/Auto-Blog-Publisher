openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Blogger API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Blogger OAuth authentication
  - name: posts
    description: Blog post management
  - name: scheduler
    description: Scheduling and automation
  - name: logs
    description: Activity logs
  - name: settings
    description: Application settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/url:
    get:
      operationId: getAuthUrl
      tags: [auth]
      summary: Get Google OAuth URL
      responses:
        "200":
          description: OAuth URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUrl"

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get authentication status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/callback:
    get:
      operationId: handleAuthCallback
      tags: [auth]
      summary: Handle OAuth callback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect after auth

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and clear tokens
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all blog posts
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [published, draft, failed, all]
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostList"

  /posts/generate:
    post:
      operationId: generatePost
      tags: [posts]
      summary: Generate and publish a new blog post
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePostBody"
      responses:
        "200":
          description: Generated post result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePostResult"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/stats:
    get:
      operationId: getPostStats
      tags: [posts]
      summary: Get posting statistics
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostStats"

  /scheduler:
    get:
      operationId: getSchedulerStatus
      tags: [scheduler]
      summary: Get scheduler status and next run time
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"

  /scheduler/run:
    post:
      operationId: runSchedulerNow
      tags: [scheduler]
      summary: Manually trigger the scheduler to run now
      responses:
        "200":
          description: Scheduler triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List activity logs
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: level
          in: query
          required: false
          schema:
            type: string
            enum: [info, error, warn, all]
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogList"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUrl:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    AuthStatus:
      type: object
      properties:
        authenticated:
          type: boolean
        blogTitle:
          type: string
        blogUrl:
          type: string
      required:
        - authenticated

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        topic:
          type: string
        niche:
          type: string
        status:
          type: string
          enum: [published, draft, failed]
        bloggerPostId:
          type: string
        bloggerUrl:
          type: string
        labels:
          type: array
          items:
            type: string
        metaDescription:
          type: string
        wordCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        publishedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - topic
        - niche
        - status
        - labels
        - wordCount
        - createdAt

    PostList:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
      required:
        - posts
        - total

    GeneratePostBody:
      type: object
      properties:
        topic:
          type: string
        niche:
          type: string
          enum: [motivation, ai, money, facts, tech]

    GeneratePostResult:
      type: object
      properties:
        success:
          type: boolean
        post:
          $ref: "#/components/schemas/Post"
        message:
          type: string
      required:
        - success

    PostStats:
      type: object
      properties:
        totalPublished:
          type: integer
        totalFailed:
          type: integer
        totalDraft:
          type: integer
        todayCount:
          type: integer
        thisWeekCount:
          type: integer
        byNiche:
          type: array
          items:
            type: object
            properties:
              niche:
                type: string
              count:
                type: integer
            required:
              - niche
              - count
        recentTitles:
          type: array
          items:
            type: string
      required:
        - totalPublished
        - totalFailed
        - totalDraft
        - todayCount
        - thisWeekCount
        - byNiche
        - recentTitles

    SchedulerStatus:
      type: object
      properties:
        enabled:
          type: boolean
        postsPerDay:
          type: integer
        nextRunAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
        isRunning:
          type: boolean
      required:
        - enabled
        - postsPerDay
        - isRunning

    Log:
      type: object
      properties:
        id:
          type: integer
        level:
          type: string
          enum: [info, error, warn]
        message:
          type: string
        details:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - level
        - message
        - createdAt

    LogList:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/Log"
        total:
          type: integer
      required:
        - logs
        - total

    Settings:
      type: object
      properties:
        blogId:
          type: string
        postsPerDay:
          type: integer
        schedulerEnabled:
          type: boolean
        niches:
          type: array
          items:
            type: string
        pexelsApiKey:
          type: string
        imagesPerPost:
          type: integer
      required:
        - blogId
        - postsPerDay
        - schedulerEnabled
        - niches
        - imagesPerPost

    UpdateSettingsBody:
      type: object
      properties:
        postsPerDay:
          type: integer
        schedulerEnabled:
          type: boolean
        niches:
          type: array
          items:
            type: string
        pexelsApiKey:
          type: string
        imagesPerPost:
          type: integer
